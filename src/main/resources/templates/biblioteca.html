<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>
<div class="contenedor">
    <h1>Biblioteca</h1>
    <p class="subtitulo">CRUD de Libros y Autores</p>

    <p th:if="${mensaje}" th:text="${mensaje}" class="alerta alerta-exito"></p>
    <p th:if="${error}" th:text="${error}" class="alerta alerta-error"></p>
    <p th:if="${aviso}" th:text="${aviso}" class="alerta alerta-aviso"></p>

    <form th:action="@{/buscar}" method="get" class="buscador">
        <input type="text" id="busqueda" name="busqueda" placeholder="Buscar por título... Ej: El alquimista">
        <button type="submit">Buscar</button>
    </form>

    <div class="tabla-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Género</th>
                    <th>Año</th>
                    <th>Copias</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="libro, iterStat : ${libros}">
                    <td th:text="${iterStat.index + 1}"></td>
                    <td th:text="${libro.titulo}"></td>
                    <td th:text="${libro.autor != null ? libro.autor.nombre : '—'}"></td>
                    <td th:text="${libro.genero}"></td>
                    <td th:text="${libro.añoPublicacion}"></td>
                    <td th:text="${libro.copiasDisponibles}"></td>
                    <td class="acciones">
                        <a th:href="@{/editar/{id}(id=${libro.id})}" class="accion-editar">Editar</a>
                        <a th:href="@{/eliminar/{id}(id=${libro.id})}"
                           class="accion-eliminar"
                           onclick="return confirm('¿Estás seguro de que deseas eliminar este libro?');">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="acciones-inferiores">
        <a th:href="@{/nuevo}" class="boton-agregar">+ Agregar libro</a>
        <a th:href="@{/autores}" class="link-secundario">Ver autores →</a>
    </div>
</div>
</body>
</html>
