<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Autores</title>
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>
<div class="contenedor">
    <h1>Autores registrados</h1>

    <p th:if="${mensaje}" th:text="${mensaje}" class="alerta alerta-exito"></p>
    <p th:if="${error}" th:text="${error}" class="alerta alerta-error"></p>
    <p th:if="${aviso}" th:text="${aviso}" class="alerta alerta-aviso"></p>

    <div class="tabla-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Nacionalidad</th>
                    <th>Fecha de nacimiento</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${autores}">
                    <td th:text="${a.id}"></td>
                    <td th:text="${a.nombre}"></td>
                    <td th:text="${a.nacionalidad}"></td>
                    <td th:text="${a.fechaNacimiento}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="acciones-inferiores">
        <a th:href="@{/autores/nuevo}" class="boton-agregar">+ Agregar autor</a>
        <a th:href="@{/}" class="link-secundario">Ir a la lista de libros →</a>
    </div>
</div>
</body>
</html>
